<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Obesity Prediction</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #1f4037, #99f2c8);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    width: 95%;
    max-width: 1100px;
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.header {
    text-align: center;
    margin-bottom: 25px;
}

.header h1 {
    color: #1f4037;
    font-size: 28px;
}

.header p {
    color: #666;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 15px;
}

.input-box {
    display: flex;
    flex-direction: column;
}

.input-box label {
    font-size: 13px;
    margin-bottom: 4px;
    color: #333;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: #1f4037;
    outline: none;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    background: #1f4037;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #14532d;
}

.result {
    margin-top: 25px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #0a7c3b;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Obesity Level Prediction</h1>
        <p>Machine Learning Based Health Analysis</p>
    </div>

    <form action="/predict" method="post">

        <div class="form-grid">

            <div class="input-box">
                <label>Gender</label>
                <select name="Gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="input-box">
                <label>Age</label>
                <input type="number" name="Age">
            </div>

            <div class="input-box">
                <label>Height</label>
                <input type="number" step="0.01" name="Height">
            </div>

            <div class="input-box">
                <label>Weight</label>
                <input type="number" step="0.01" name="Weight">
            </div>

            <div class="input-box">
                <label>Family History</label>
                <select name="family_history_with_overweight">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>High Calorie Food</label>
                <select name="FAVC">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Vegetable Intake</label>
                <input type="number" step="0.1" name="FCVC">
            </div>

            <div class="input-box">
                <label>Meals per Day</label>
                <input type="number" step="0.1" name="NCP">
            </div>

            <div class="input-box">
                <label>Snacking</label>
                <select name="CAEC">
                    <option value="no">No</option>
                    <option value="sometimes">Sometimes</option>
                    <option value="frequently">Frequently</option>
                    <option value="always">Always</option>
                </select>
            </div>

            <div class="input-box">
                <label>Smoking</label>
                <select name="SMOKE">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Water Intake</label>
                <input type="number" step="0.1" name="CH2O">
            </div>

            <div class="input-box">
                <label>Calorie Monitoring</label>
                <select name="SCC">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Physical Activity</label>
                <input type="number" step="0.1" name="FAF">
            </div>

            <div class="input-box">
                <label>Screen Time</label>
                <input type="number" step="0.1" name="TUE">
            </div>

            <div class="input-box">
                <label>Alcohol Consumption</label>
                <select name="CALC">
                    <option value="no">No</option>
                    <option value="sometimes">Sometimes</option>
                    <option value="frequently">Frequently</option>
                    <option value="always">Always</option>
                </select>
            </div>

            <div class="input-box">
                <label>Transportation</label>
                <select name="MTRANS">
                    <option value="public_transportation">Public Transport</option>
                    <option value="walking">Walking</option>
                    <option value="automobile">Car</option>
                    <option value="bike">Bike</option>
                    <option value="motorbike">Motorbike</option>
                </select>
            </div>

        </div>

        <button type="submit">Predict</button>

    </form>

    <div class="result">
        {{ prediction_text }}
    </div>

</div>

</body>
</html>
